name: Update Shoptet Data

on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC = 05:00 CET (zima) / 06:00 CEST (léto)
  workflow_dispatch:       # Ruční spuštění přes GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run all market updates
        env:
          SHOPTET_API_TOKEN_AT: ${{ secrets.SHOPTET_API_TOKEN_AT }}
          SHOPTET_API_TOKEN_PL: ${{ secrets.SHOPTET_API_TOKEN_PL }}
          SHOPTET_API_TOKEN_NL: ${{ secrets.SHOPTET_API_TOKEN_NL }}
          SHOPTET_API_TOKEN_DE: ${{ secrets.SHOPTET_API_TOKEN_DE }}
          SHOPTET_API_TOKEN_SK: ${{ secrets.SHOPTET_API_TOKEN_SK }}
          SHOPTET_API_TOKEN_CZ: ${{ secrets.SHOPTET_API_TOKEN_CZ }}
        run: node scripts/updateAllMarkets.js
